name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  XCODE_VERSION: '15.1'
  IOS_SIMULATOR: 'iPhone 15'
  IOS_VERSION: '17.2'

jobs:
  code-formatting:
    name: Code Formatting
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SwiftFormat
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/swiftformat
          key: swiftformat-${{ runner.os }}
          
      - name: Install SwiftFormat
        run: |
          if ! command -v swiftformat &> /dev/null; then
            brew install swiftformat
          fi
          
      - name: Check Swift code formatting
        run: |
          swiftformat --lint --reporter github-actions-log .
          
      - name: Cache SwiftLint
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/swiftlint
          key: swiftlint-${{ runner.os }}
          
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
          
      - name: Run SwiftLint
        run: |
          swiftlint lint --reporter github-actions-logging

  static-analysis:
    name: Static Analysis
    runs-on: macos-14
    needs: code-formatting
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Resolve Swift Package dependencies
        run: |
          if [ -f "Package.swift" ]; then
            swift package resolve
          fi
          
      - name: Run Static Analysis with Xcode
        run: |
          set -o pipefail
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            xcodebuild analyze \
              -workspace "$WORKSPACE" \
              -scheme "YourAppScheme" \
              -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
              -quiet \
              | xcpretty --report json-compilation-database --output compile_commands.json
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            xcodebuild analyze \
              -project "$PROJECT" \
              -scheme "YourAppScheme" \
              -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
              -quiet \
              | xcpretty --report json-compilation-database --output compile_commands.json
          fi
          
      - name: Install Periphery (Dead Code Detection)
        run: |
          brew install peripheryapp/periphery/periphery
          
      - name: Run Periphery Analysis
        run: |
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            periphery scan \
              --workspace "$WORKSPACE" \
              --scheme "YourAppScheme" \
              --targets "YourAppTarget" \
              --format github-actions
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            periphery scan \
              --project "$PROJECT" \
              --scheme "YourAppScheme" \
              --targets "YourAppTarget" \
              --format github-actions
          fi
        continue-on-error: true

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: macos-14
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Create iOS Simulator
        run: |
          xcrun simctl create "iPhone15-CI" "iPhone 15" "iOS17.2" || true
          xcrun simctl boot "iPhone15-CI" || true
          
      - name: Run Unit Tests
        run: |
          set -o pipefail
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            xcodebuild test \
              -workspace "$WORKSPACE" \
              -scheme "YourAppScheme" \
              -destination "platform=iOS Simulator,name=iPhone15-CI" \
              -enableCodeCoverage YES \
              -derivedDataPath DerivedData \
              | xcpretty --test --color
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            xcodebuild test \
              -project "$PROJECT" \
              -scheme "YourAppScheme" \
              -destination "platform=iOS Simulator,name=iPhone15-CI" \
              -enableCodeCoverage YES \
              -derivedDataPath DerivedData \
              | xcpretty --test --color
          fi
          
      - name: Generate Coverage Report
        run: |
          xcrun xccov view DerivedData/Logs/Test/*.xccovreport --report --only-targets
          
      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(xcrun xccov view DerivedData/Logs/Test/*.xccovreport --report --only-targets | grep "YourAppTarget" | awk '{print $4}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below minimum threshold of 80%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets minimum threshold"
          fi
          
      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          files: DerivedData/Logs/Test/*.xccovreport
          fail_ci_if_error: false
          verbose: true

  build-verification:
    name: Build Verification
    runs-on: macos-14
    needs: unit-tests
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            xcodebuild build \
              -workspace "$WORKSPACE" \
              -scheme "YourAppScheme" \
              -configuration "${{ matrix.configuration }}" \
              -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
              -quiet \
              | xcpretty
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            xcodebuild build \
              -project "$PROJECT" \
              -scheme "YourAppScheme" \
              -configuration "${{ matrix.configuration }}" \
              -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.IOS_VERSION }}" \
              -quiet \
              | xcpretty
          fi
          
      - name: Archive Build Artifacts
        if: matrix.configuration == 'Release'
        run: |
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "YourAppScheme" \
              -configuration "Release" \
              -archivePath "build/YourApp.xcarchive" \
              -quiet \
              | xcpretty
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "YourAppScheme" \
              -configuration "Release" \
              -archivePath "build/YourApp.xcarchive" \
              -quiet \
              | xcpretty
          fi
          
      - name: Upload Build Artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: build/YourApp.xcarchive
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    runs-on: macos-14
    needs: build-verification
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Create iOS Simulator
        run: |
          xcrun simctl create "iPhone15-E2E" "iPhone 15" "iOS17.2" || true
          xcrun simctl boot "iPhone15-E2E" || true
          xcrun simctl list devices available
          
      - name: Run UI Tests
        run: |
          set -o pipefail
          if [ -f "*.xcworkspace" ]; then
            WORKSPACE=$(find . -name "*.xcworkspace" | head -1)
            xcodebuild test \
              -workspace "$WORKSPACE" \
              -scheme "YourAppUITests" \
              -destination "platform=iOS Simulator,name=iPhone15-E2E" \
              -derivedDataPath DerivedData \
              | xcpretty --test --color
          elif [ -f "*.xcodeproj" ]; then
            PROJECT=$(find . -name "*.xcodeproj" | head -1)
            xcodebuild test \
              -project "$PROJECT" \
              -scheme "YourAppUITests" \
              -destination "platform=iOS Simulator,name=iPhone15-E2E" \
              -derivedDataPath DerivedData \
              | xcpretty --test --color
          fi
          
      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: |
            DerivedData/Logs/Test/
            ~/Library/Developer/CoreSimulator/Devices/**/data/tmp/
          retention-days: 7

  pre-deployment:
    name: Pre-Deployment Verification
    runs-on: macos-14
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          
      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-archive
          path: build/
          
      - name: Validate Archive
        run: |
          if [ -f "build/YourApp.xcarchive" ]; then
            echo "✅ Archive exists"
            ls -la build/YourApp.xcarchive/
          else
            echo "❌ Archive not found"
            exit 1
          fi
          
      - name: Export IPA (Dry Run)
        run: |
          # Create export options plist for dry run
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>YOUR_TEAM_ID</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          # Export IPA for validation
          xcodebuild -exportArchive \
            -archivePath "build/YourApp.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "ExportOptions.plist" \
            | xcpretty
            
      - name: Validate Export
        run: |
          if [ -f "build/export/YourApp.ipa" ]; then
            echo "✅ IPA export successful"
            ls -la build/export/
          else
            echo "❌ IPA export failed"
            exit 1
          fi