# SwiftLint Configuration for iOS SwiftUI Project

# Included and excluded directories
included:
  - Sources
  - App
  - Tests
  - Shared

excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - build
  - vendor
  - node_modules
  - .git

# Configuration for specific rules
line_length:
  warning: 120
  error: 150
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

function_parameter_count:
  warning: 6
  error: 8

type_body_length:
  warning: 300
  error: 400

type_name:
  min_length: 2
  max_length: 40
  excluded:
    - T
    - ID

identifier_name:
  min_length: 2
  max_length: 40
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level: 3
  function_level: 5

# Enabled rules
opt_in_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - anyobject_protocol
  - array_init
  - attributes
  - balanced_xctest_lifecycle
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - conditional_returns_on_newline
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - explicit_self
  - explicit_top_level_acl
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - file_name
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - private_action
  - private_outlet
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - required_enum_case
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition

# Disabled rules
disabled_rules:
  - todo
  - type_contents_order
  - file_types_order

# Custom rules
custom_rules:
  swiftui_state_private:
    name: "SwiftUI @State should be private"
    regex: "^(\\s)*@State\\s+(var|let)"
    message: "@State properties should be marked as private"
    severity: warning

  swiftui_observedobject_private:
    name: "SwiftUI @ObservedObject should be private"
    regex: "^(\\s)*@ObservedObject\\s+(var|let)"
    message: "@ObservedObject properties should be marked as private"
    severity: warning

  swiftui_environmentobject_private:
    name: "SwiftUI @EnvironmentObject should be private"
    regex: "^(\\s)*@EnvironmentObject\\s+(var|let)"
    message: "@EnvironmentObject properties should be marked as private"
    severity: warning

  no_objcMembers:
    name: "No @objcMembers"
    regex: "@objcMembers"
    message: "@objcMembers is not recommended in Swift"
    severity: warning

  no_nslog:
    name: "No NSLog"
    regex: "NSLog"
    message: "Use os_log or print instead of NSLog"
    severity: warning

  no_force_cast:
    name: "No force cast"
    regex: "as!"
    message: "Use safe casting with 'as?' instead of force casting 'as!'"
    severity: error

  swiftui_preview_private:
    name: "SwiftUI Preview should be private"
    regex: "struct\\s+\\w+_Previews"
    message: "SwiftUI Preview structs should be private"
    severity: warning

# File header rule configuration
file_header:
  required_pattern: |
                    \/\/
                    \/\/  .*?\.swift
                    \/\/  
                    \/\/
                    \/\/  Created by .* on \d{1,2}\/\d{1,2}\/\d{2,4}\.
                    \/\/

# Reporter configuration
reporter: "xcode"

# Additional configurations
analyzer_rules:
  - explicit_self
  - unused_import
  - unused_declaration